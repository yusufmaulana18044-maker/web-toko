<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Login API</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
    }
    .form-group {
      margin: 15px 0;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      background-color: #4CAF50;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background-color: #45a049;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      background-color: #f0f0f0;
      border-radius: 4px;
      border: 1px solid #ddd;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .error {
      background-color: #ffcccc;
      border-color: #cc0000;
      color: #cc0000;
    }
    .success {
      background-color: #ccffcc;
      border-color: #00cc00;
      color: #00cc00;
    }
  </style>
</head>
<body>
  <h1>Test Login API</h1>
  
  <div class="form-group">
    <label>Username:</label>
    <input type="text" id="username" value="kasir">
  </div>
  
  <div class="form-group">
    <label>Password:</label>
    <input type="password" id="password" value="kasir123">
  </div>
  
  <button onclick="testLogin()">Test Login</button>
  
  <div id="result"></div>

  <script>
    async function testLogin() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const resultDiv = document.getElementById('result');
      
      try {
        console.log('Sending login request...');
        const response = await fetch('http://localhost:5000/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });
        
        console.log('Response status:', response.status);
        const data = await response.json();
        console.log('Response data:', data);
        
        if (data.success) {
          resultDiv.className = 'result success';
          resultDiv.textContent = 'LOGIN BERHASIL!\n\n' + JSON.stringify(data, null, 2);
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
        } else {
          resultDiv.className = 'result error';
          resultDiv.textContent = 'LOGIN GAGAL!\n\n' + JSON.stringify(data, null, 2);
        }
      } catch(err) {
        console.error('Error:', err);
        resultDiv.className = 'result error';
        resultDiv.textContent = 'ERROR: ' + err.message;
      }
    }
  </script>
</body>
</html>
